<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三国杀 - 网页版</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
:root {
--bg: #1a0a00; --panel-bg: #2a1a0a; --border: #8b6914; --gold: #d4a017;
--red: #c0392b; --green: #27ae60; --blue: #2980b9; --text: #e8d5b7;
--text-dark: #a08060; --card-bg: #f5e6c8; --highlight: #f39c12;
--danger: #e74c3c; --success: #2ecc71;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
background:var(--bg);
background-image:radial-gradient(ellipse at center,#2a1a0a 0%,#1a0a00 70%);
color:var(--text);font-family:'STKaiti','KaiTi','SimSun',serif;
min-height:100vh;overflow-x:hidden;
}
.top-bar{
background:linear-gradient(180deg,#3a1a00 0%,#2a0a00 100%);
border-bottom:2px solid var(--border);padding:10px 20px;
display:flex;align-items:center;justify-content:space-between;
box-shadow:0 2px 20px rgba(0,0,0,0.5);
}
.top-bar .logo{font-size:28px;font-weight:bold;color:var(--gold);text-shadow:0 0 10px rgba(212,160,23,0.5);letter-spacing:4px}
.top-bar .logo span{color:var(--red)}
.top-bar input{
background:var(--panel-bg);border:1px solid var(--border);color:var(--text);
padding:8px 14px;border-radius:4px;font-size:14px;font-family:inherit;width:140px;
}
.btn{
background:linear-gradient(180deg,#5a3a10 0%,#3a1a00 100%);
border:1px solid var(--border);color:var(--gold);padding:8px 20px;
border-radius:4px;cursor:pointer;font-size:14px;font-family:inherit;
transition:all 0.2s;white-space:nowrap;
}
.btn:hover{background:linear-gradient(180deg,#7a5a20 0%,#5a3a10 100%);border-color:var(--gold);box-shadow:0 0 10px rgba(212,160,23,0.3)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-success{border-color:var(--green);color:var(--green)}
.btn-blue{border-color:var(--blue);color:var(--blue)}
.btn-sm{padding:4px 12px;font-size:12px}
.main-container{max-width:1400px;margin:0 auto;padding:20px}
.panel{
background:var(--panel-bg);border:1px solid var(--border);border-radius:8px;
padding:20px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.panel-title{font-size:20px;color:var(--gold);border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:15px;letter-spacing:2px}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.room-card{
background:linear-gradient(135deg,#2a1a0a 0%,#1a0a00 100%);
border:1px solid var(--border);border-radius:8px;padding:15px;cursor:pointer;transition:all 0.2s;
}
.room-card:hover{border-color:var(--gold);box-shadow:0 0 15px rgba(212,160,23,0.2);transform:translateY(-2px)}
.room-card .room-id{font-size:18px;color:var(--gold);font-weight:bold}
.room-card .room-info{color:var(--text-dark);font-size:13px;margin-top:8px}
.room-card .player-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.room-card .player-tag{background:rgba(139,105,20,0.2);border:1px solid var(--border);border-radius:12px;padding:2px 10px;font-size:12px}
.room-card .player-tag.ai{border-color:var(--blue);color:var(--blue)}
.room-card .status{margin-top:10px;font-size:13px}
.room-card .status.playing{color:var(--red)}
.room-card .status.waiting{color:var(--green)}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;max-height:300px;overflow-y:auto}
.hero-card{
background:linear-gradient(135deg,#2a1a0a 0%,#1a0a00 100%);
border:2px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;text-align:center;transition:all 0.2s;
}
.hero-card:hover,.hero-card.selected{border-color:var(--gold);box-shadow:0 0 15px rgba(212,160,23,0.3)}
.hero-card .hero-name{font-size:16px;color:var(--gold);font-weight:bold}
.hero-card .hero-kingdom{font-size:12px;margin:4px 0}
.hero-card .hero-hp{font-size:12px;color:var(--red)}
.hero-card .hero-skills{font-size:11px;color:var(--text-dark);margin-top:4px}
.game-container{display:none;position:relative;min-height:80vh}
.game-container.active{display:block}
.other-players{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin-bottom:20px}
.player-mini{
background:var(--panel-bg);border:2px solid var(--border);border-radius:10px;
padding:12px;min-width:140px;text-align:center;transition:all 0.3s;
}
.player-mini.current{border-color:var(--gold);box-shadow:0 0 20px rgba(212,160,23,0.4);animation:pulse 2s infinite}
.player-mini.dead{opacity:0.4;border-color:#555}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(212,160,23,0.4)}50%{box-shadow:0 0 30px rgba(212,160,23,0.7)}}
.player-mini .pname{font-size:14px;color:var(--gold)}
.player-mini .phero{font-size:12px;color:var(--text-dark)}
.player-mini .php{font-size:12px}
.player-mini .pinfo{font-size:11px;color:var(--text-dark);margin-top:4px}
.game-log{
background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:8px;
padding:10px;max-height:150px;overflow-y:auto;margin-bottom:15px;font-size:13px;line-height:1.8;
}
.game-log .log-entry{padding:2px 0;border-bottom:1px solid rgba(139,105,20,0.1)}
.my-hand{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;padding:15px 0;min-height:140px}
.card-item{
width:80px;height:110px;background:var(--card-bg);border:2px solid var(--card-border);
border-radius:6px;padding:6px;cursor:pointer;transition:all 0.2s;
display:flex;flex-direction:column;align-items:center;justify-content:center;
position:relative;font-size:11px;color:#333;text-align:center;user-select:none;
}
.card-item:hover{transform:translateY(-10px);box-shadow:0 10px 20px rgba(0,0,0,0.4);border-color:var(--gold)}
.card-item.selected{border-color:var(--red);box-shadow:0 0 15px rgba(231,76,60,0.5);transform:translateY(-15px)}
.card-item .card-name{font-weight:bold;font-size:14px}
.card-item .card-suit{font-size:18px}
.card-item .card-type{font-size:10px;color:#666;margin-top:4px}
.card-item.red{color:#c0392b}
.card-item.black{color:#2c3e50}
.my-equipment{display:flex;gap:10px;justify-content:center;margin:10px 0}
.equip-slot{
width:70px;height:95px;border:1px dashed var(--border);border-radius:6px;
display:flex;align-items:center;justify-content:center;font-size:11px;
color:var(--text-dark);text-align:center;background:rgba(0,0,0,0.3);
}
.equip-slot.filled{background:var(--card-bg);border-style:solid;color:#333}
.action-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:15px 0}
.response-overlay{
position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);
display:flex;align-items:center;justify-content:center;z-index:1000;
}
.response-dialog{
background:var(--panel-bg);border:2px solid var(--gold);border-radius:12px;
padding:30px;text-align:center;max-width:500px;
}
.response-dialog h3{color:var(--gold);margin-bottom:15px}
.response-dialog .cards-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:15px 0}
.phase-indicator{
text-align:center;padding:8px;background:rgba(212,160,23,0.15);
border:1px solid var(--gold);border-radius:20px;margin-bottom:15px;
font-size:14px;color:var(--gold);letter-spacing:2px;
}
.hidden{display:none!important}
.text-center{text-align:center}
.mt-10{margin-top:10px}
.mt-20{margin-top:20px}
.mb-10{margin-bottom:10px}
.flex{display:flex}
.flex-wrap{flex-wrap:wrap}
.justify-center{justify-content:center}
.items-center{align-items:center}
.gap-10{gap:10px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.hero-avatar{width:56px;height:56px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:28px;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.25),rgba(0,0,0,.25));border:2px solid var(--border);box-shadow:inset 0 0 12px rgba(0,0,0,.35)}
.player-mini .hero-avatar{width:48px;height:48px;font-size:24px;margin-bottom:6px}.room-expire{color:var(--text-dark);font-size:12px;text-align:center;margin-bottom:8px}.sound-toggle{position:fixed;right:12px;bottom:12px;z-index:1200;border-radius:999px;padding:10px 12px;background:rgba(42,26,10,.92)}
@media(max-width:768px){body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}.top-bar{position:sticky;top:0;z-index:100;padding:8px 10px;gap:8px;flex-wrap:wrap}.top-bar .logo{font-size:22px;letter-spacing:2px}.top-bar .user-info{display:flex;gap:6px;width:100%}.top-bar input{flex:1;width:auto}.main-container{padding:10px}.panel{padding:12px;margin-bottom:12px}.room-grid{grid-template-columns:1fr}.hero-grid{grid-template-columns:repeat(2,minmax(0,1fr));max-height:none}.other-players{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.player-mini{min-width:0;padding:8px}.game-log{max-height:110px;font-size:12px}.my-hand{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(26,10,0,.2),rgba(26,10,0,.96));z-index:20;overflow-x:auto;flex-wrap:nowrap;justify-content:flex-start;padding:12px 4px}.card-item{min-width:64px;width:64px;height:92px;font-size:10px}.card-item:hover{transform:translateY(-4px)}.action-bar{position:sticky;bottom:116px;background:rgba(26,10,0,.92);z-index:21;padding:8px}.btn{padding:9px 12px}.response-dialog{max-width:92vw;padding:18px}.response-dialog .cards-row{max-height:50vh;overflow:auto}.phase-indicator{position:sticky;top:78px;z-index:50}}

@media(max-width:768px){
.card-item{width:60px;height:85px;font-size:10px}
.card-item .card-name{font-size:12px}
.player-mini{min-width:100px;padding:8px}
.hero-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
}
</style>
</head>
<body>
<div class="top-bar">
<div class="logo">三<span>国</span>杀</div>
<div class="user-info">
<input type="text" id="playerName" placeholder="输入你的名字" value="玩家">
<button class="btn" onclick="refreshRooms()">刷新房间</button>
</div>
</div>
<div class="main-container">
<div id="lobbyView">
<div class="panel">
<div class="panel-title">&#x1F3EF; 游戏大厅</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px">
<button class="btn btn-success" onclick="showCreateRoom()">创建房间</button>
<input type="text" id="joinRoomId" placeholder="输入房间号" style="background:var(--panel-bg);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:4px;font-family:inherit;width:140px">
<button class="btn btn-blue" onclick="joinRoom()">加入房间</button>
</div>
<div class="room-grid" id="roomList">
<div style="color:var(--text-dark);grid-column:1/-1;text-align:center;padding:40px">暂无房间，点击"创建房间"开始游戏</div>
</div>
</div>
</div>
<div id="createRoomView" class="hidden">
<div class="panel">
<div class="panel-title">&#x1F3AF; 创建房间</div>
<div class="mb-10" style="color:var(--text-dark)">选择你的英雄：</div>
<div class="hero-grid" id="heroSelect"></div>
<div class="mt-20 flex gap-10 flex-wrap items-center">
<button class="btn btn-success" onclick="createRoom()">确认创建</button>
<button class="btn" onclick="backToLobby()">返回大厅</button>
</div>
</div>
</div>
<div id="roomWaitView" class="hidden">
<div class="panel">
<div class="panel-title">&#x1F3E0; 房间 <span id="waitRoomId" style="color:var(--gold)"></span></div>
<div id="waitPlayerList" class="flex flex-wrap gap-10 mb-10"></div>
<div class="flex gap-10 items-center flex-wrap mb-10">
<span>添加AI：</span>
<select id="aiLevel" style="background:var(--panel-bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-family:inherit">
<option value="easy">简单</option>
<option value="medium" selected>中等</option>
<option value="hard">困难</option>
</select>
<button class="btn btn-sm btn-blue" onclick="addAI(1)">+1 AI</button>
<button class="btn btn-sm btn-blue" onclick="addAI(2)">+2 AI</button>
<button class="btn btn-sm btn-blue" onclick="addAI(4)">+4 AI</button>
</div>
<div class="flex gap-10">
<button class="btn btn-success" id="startGameBtn" onclick="startGame()">开始游戏</button>
<button class="btn btn-danger" onclick="leaveRoom()">离开房间</button>
</div>
</div>
</div>
<div id="gameView" class="game-container">
<div class="phase-indicator" id="phaseIndicator">准备中...</div>
<div class="room-expire" id="roomExpire"></div>
<div class="other-players" id="otherPlayers"></div>
<div class="game-log" id="gameLog"></div>
<div class="my-equipment" id="myEquipment">
<div class="equip-slot">武器</div><div class="equip-slot">防具</div>
<div class="equip-slot">+1马</div><div class="equip-slot">-1马</div>
</div>
<div class="my-hand" id="myHand"></div>
<div class="action-bar" id="actionBar"></div>
<div id="targetSelect" class="hidden">
<div class="panel-title mb-10">选择目标</div>
<div class="other-players" id="targetPlayers"></div>
<div class="text-center mt-10"><button class="btn" onclick="cancelTarget()">取消</button></div>
</div>
</div>
<div id="responseOverlay" class="response-overlay hidden">
<div class="response-dialog" id="responseDialog"></div>
</div>
</div>
<script>
const socket=io();
let myPlayerId=null,currentRoomId=null,gameState=null,selectedHero=null,selectedCardId=null,pendingCardAction=null,heroes=[];
let soundEnabled=localStorage.getItem('sgsSound')!=='off',lastPhase=null,lastLogLen=0;
function md5LikeName(){const ua=navigator.userAgent||'ua';let h=0;for(let i=0;i<ua.length;i++){h=((h<<5)-h)+ua.charCodeAt(i);h|=0}return '玩家'+Math.abs(h).toString(16).slice(0,6)}
document.addEventListener('DOMContentLoaded',()=>{const input=document.getElementById('playerName');if(input&&(!input.value||input.value==='玩家'))input.value=md5LikeName();updateSoundButton()});
function heroAvatar(name){const map={刘备:'🟢',关羽:'🟩',张飞:'🧔',赵云:'🐉',诸葛亮:'🪶',曹操:'🔵',司马懿:'🦉',夏侯惇:'⚔️',张辽:'🛡️',郭嘉:'📜',孙权:'🔴',周瑜:'🔥',陆逊:'📘',大乔:'🌸',吕布:'🐺',貂蝉:'💃',华佗:'🌿'};return map[name]||'🏯'}
function playTone(kind='click'){if(!soundEnabled)return;try{const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;const ctx=new AC(),osc=ctx.createOscillator(),gain=ctx.createGain();const freq={start:523,card:659,hit:180,turn:440,win:784,click:330}[kind]||330;osc.frequency.value=freq;osc.type=kind==='hit'?'sawtooth':'sine';gain.gain.setValueAtTime(.0001,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(.12,ctx.currentTime+.02);gain.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.18);osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+.2)}catch(e){}}
function toggleSound(){soundEnabled=!soundEnabled;localStorage.setItem('sgsSound',soundEnabled?'on':'off');updateSoundButton();playTone('click')}
function updateSoundButton(){const b=document.getElementById('soundToggle');if(b)b.textContent=soundEnabled?'🔊 音效':'🔇 静音'}
socket.on('connect',()=>{refreshRooms()});
socket.on('room_list',rooms=>renderRoomList(rooms));
socket.on('room_created',data=>{myPlayerId=data.player_id;currentRoomId=data.room_id;gameState=data.game;showRoomWait()});
socket.on('room_joined',data=>{myPlayerId=data.player_id;currentRoomId=data.room_id;gameState=data.game;showRoomWait()});
socket.on('game_state',state=>{gameState=state;if(state.game_started){showGameView();renderGame()}else{renderWaitRoom()}});
socket.on('error',data=>alert(data.message));
socket.on('room_closed',data=>{alert(data.message||'房间已关闭');leaveRoom()});
function showView(id){document.querySelectorAll('#lobbyView,#createRoomView,#roomWaitView,#gameView').forEach(e=>e.classList.add('hidden'));document.getElementById(id).classList.remove('hidden')}
function backToLobby(){showView('lobbyView');selectedHero=null;refreshRooms()}
function showCreateRoom(){showView('createRoomView');loadHeroes()}
function showRoomWait(){showView('roomWaitView');document.getElementById('waitRoomId').textContent=currentRoomId;renderWaitRoom()}
function showGameView(){showView('gameView');document.getElementById('gameView').classList.add('active')}
async function loadHeroes(){try{const r=await fetch('/api/heroes');heroes=await r.json();renderHeroGrid()}catch(e){}}
function renderHeroGrid(){const k={'魏':'#2980b9','蜀':'#27ae60','吴':'#e74c3c','群':'#8e44ad'};document.getElementById('heroSelect').innerHTML=heroes.map(h=>'<div class="hero-card '+(selectedHero===h.name?'selected':'')+'" onclick="selectHero(\''+h.name+'\')"><div class="hero-avatar">'+heroAvatar(h.name)+'</div><div class="hero-name">'+h.name+'</div><div class="hero-kingdom" style="color:'+(k[h.kingdom]||'#888')+'">'+h.kingdom+'</div><div class="hero-hp">❤ '+h.max_hp+'</div><div class="hero-skills">'+h.skills.join('<br>')+'</div></div>').join('')}
function selectHero(n){selectedHero=n;renderHeroGrid()}
function createRoom(){const n=document.getElementById('playerName').value||'玩家';if(!selectedHero){alert('请选择英雄');return};socket.emit('create_room',{name:n,hero:selectedHero})}
function joinRoom(){const rid=document.getElementById('joinRoomId').value.trim();const n=document.getElementById('playerName').value||'玩家';if(!rid){alert('请输入房间号');return};if(!selectedHero){loadHeroes().then(()=>{if(heroes.length>0)selectedHero=heroes[0].name;socket.emit('join_room',{room_id:rid,name:n,hero:selectedHero||heroes[0]?.name})});return};socket.emit('join_room',{room_id:rid,name:n,hero:selectedHero})}
function leaveRoom(){currentRoomId=null;myPlayerId=null;gameState=null;backToLobby()}
function addAI(c){const l=document.getElementById('aiLevel').value;socket.emit('add_ai',{room_id:currentRoomId,ai_level:l,count:c})}
function startGame(){socket.emit('start_game',{room_id:currentRoomId})}
function refreshRooms(){fetch('/api/rooms').then(r=>r.json()).then(rooms=>renderRoomList(rooms))}
function renderRoomList(rooms){const l=document.getElementById('roomList');if(!rooms||rooms.length===0){l.innerHTML='<div style="color:var(--text-dark);grid-column:1/-1;text-align:center;padding:40px">暂无房间，点击"创建房间"开始游戏</div>';return};l.innerHTML=rooms.map(r=>'<div class="room-card" onclick="document.getElementById(\'joinRoomId\').value=\''+r.room_id+'\';joinRoom()"><div class="room-id">🏠 '+r.room_id+'</div><div class="room-info">'+r.human_count+'人 + '+(r.player_count-r.human_count)+'AI / '+r.max_players+'人</div><div class="player-list">'+r.players.map(p=>'<span class="player-tag '+(p.is_ai?'ai':'')+'">'+p.hero+' '+p.name+'</span>').join('')+'</div><div class="status '+(r.game_started?'playing':'waiting')+'">'+(r.game_started?'🔴 游戏中':'🟢 等待中')+'</div></div>').join('')}
function renderWaitRoom(){if(!gameState)return;const ps=gameState.players||[];document.getElementById('waitPlayerList').innerHTML=ps.map(p=>'<div class="player-mini"><div class="hero-avatar">'+heroAvatar(p.hero.name)+'</div><div class="pname">'+p.name+'</div><div class="phero">'+p.hero.name+' · '+p.hero.kingdom+'</div><div class="pinfo">❤ '+p.max_hp+' '+(p.is_ai?'🤖':'👤')+'</div></div>').join('');document.getElementById('startGameBtn').disabled=ps.length<2}
function renderGame(){
if(!gameState)return;
const mp=gameState.my_player,ps=gameState.players||[],cpid=gameState.current_player_id,phase=gameState.phase;
const pn={waiting:'等待中...',judge:'判定阶段',draw:'摸牌阶段',play:'出牌阶段',discard:'弃牌阶段',game_over:'游戏结束'};
const cp=ps.find(p=>p.player_id===cpid);
document.getElementById('phaseIndicator').textContent='回合 '+gameState.turn_count+' · '+(pn[phase]||phase)+' · '+(cp?cp.name:'');const exp=document.getElementById('roomExpire');if(exp&&gameState.expires_in!==undefined){const m=Math.floor(gameState.expires_in/60),sec=gameState.expires_in%60;exp.textContent='房间约 '+m+'分'+String(sec).padStart(2,'0')+'秒后自动解散'}if(lastPhase&&lastPhase!==phase)playTone(phase==='game_over'?'win':phase==='play'?'turn':'click');lastPhase=phase;
const od=document.getElementById('otherPlayers');
const ops=ps.filter(p=>p.player_id!==myPlayerId);
od.innerHTML=ops.map(p=>'<div class="player-mini '+(p.player_id===cpid?'current':'')+' '+(p.is_alive?'':'dead')+'" onclick="'+(phase==='play'&&myPlayerId===cpid&&p.is_alive?'selectTarget(\''+p.player_id+'\')':'')+'"><div class="pname">'+p.name+' '+(p.is_ai?'🤖':'')+'</div><div class="phero">'+p.hero.name+' · '+p.hero.kingdom+'</div><div class="php">'+'❤'.repeat(p.hp)+'🖤'.repeat(p.max_hp-p.hp)+'</div><div class="pinfo">手牌: '+p.hand_count+' | 装备: '+Object.values(p.equipment).filter(e=>e).length+'</div></div>').join('');
const hd=document.getElementById('myHand');
if(mp&&mp.hand_cards){hd.innerHTML=mp.hand_cards.map(c=>'<div class="card-item '+(c.suit==='♥'||c.suit==='♦'?'red':'black')+' '+(selectedCardId===c.id?'selected':'')+'" onclick="selectCard('+c.id+')"><div class="card-suit">'+c.suit+c.number+'</div><div class="card-name">'+c.name+'</div><div class="card-type">'+c.category+'</div></div>').join('')}else{hd.innerHTML=''}
const ed=document.getElementById('myEquipment');
if(mp&&mp.equipment){const ss=[{key:'weapon',label:'武器'},{key:'armor',label:'防具'},{key:'mount_plus',label:'+1马'},{key:'mount_minus',label:'-1马'}];ed.innerHTML=ss.map(s=>{const eq=mp.equipment[s.key];if(eq){return'<div class="equip-slot filled"><div class="card-suit '+(eq.suit==='♥'||eq.suit==='♦'?'red':'black')+'">'+eq.suit+eq.number+'</div><div>'+eq.name+'</div></div>'}return'<div class="equip-slot">'+s.label+'</div>'}).join('')}
const ab=document.getElementById('actionBar');
const imt=myPlayerId===cpid&&phase==='play';
const imd=myPlayerId===cpid&&phase==='discard';
if(phase==='game_over'){const w=ps.find(p=>p.is_alive);ab.innerHTML='<div style="text-align:center;font-size:24px;color:var(--gold)">🎉 '+(w?w.name+' 获胜！':'平局')+'</div><button class="btn btn-success mt-10" onclick="leaveRoom()">返回大厅</button>'}
else if(imt){ab.innerHTML='<button class="btn btn-success" onclick="useSelectedCard()">使用选中卡牌</button><button class="btn btn-blue" onclick="equipSelectedCard()">装备选中卡牌</button><button class="btn" onclick="endPlayPhase()">结束出牌</button>'}
else if(imd){const p=gameState.pending_action;if(p&&p.type==='discard_phase'){ab.innerHTML='<span style="color:var(--gold)">请弃置 '+p.to_discard+' 张牌（点击卡牌选中，然后确认）</span><button class="btn btn-danger" onclick="confirmDiscard()">确认弃牌</button>'}}
else{ab.innerHTML='<span style="color:var(--text-dark)">等待其他玩家行动...</span>'}
const ld=document.getElementById('gameLog');
if(gameState.log){if(gameState.log.length>lastLogLen)playTone('card');lastLogLen=gameState.log.length;ld.innerHTML=gameState.log.slice(-15).map(l=>'<div class="log-entry">'+l+'</div>').join('');ld.scrollTop=ld.scrollHeight}
handlePendingAction()
}
function handlePendingAction(){
const p=gameState?.pending_action;
if(!p){document.getElementById('responseOverlay').classList.add('hidden');return}
const mp=gameState.my_player,ov=document.getElementById('responseOverlay'),dg=document.getElementById('responseDialog');
if(p.type==='respond_shan'&&p.target_id===myPlayerId){ov.classList.remove('hidden');const sc=(mp.hand_cards||[]).filter(c=>c.type==='SHAN');dg.innerHTML='<h3>⚔ 需要出【闪】响应【杀】</h3><div class="cards-row">'+sc.map(c=>'<div class="card-item red" onclick="respondCard('+c.id+')"><div class="card-suit">'+c.suit+c.number+'</div><div class="card-name">'+c.name+'</div></div>').join('')+'</div><button class="btn btn-danger" onclick="passResponse()">不出闪（受到伤害）</button>'}
else if(p.type==='respond_juedou'&&(p.target_id===myPlayerId||p.source_id===myPlayerId)){ov.classList.remove('hidden');const sc=(mp.hand_cards||[]).filter(c=>c.type==='SHA');dg.innerHTML='<h3>⚔ 决斗！需要出【杀】</h3><div class="cards-row">'+sc.map(c=>'<div class="card-item black" onclick="respondCard('+c.id+')"><div class="card-suit">'+c.suit+c.number+'</div><div class="card-name">'+c.name+'</div></div>').join('')+'</div><button class="btn btn-danger" onclick="passResponse()">不出杀（受到伤害）</button>'}
else if(p.type==='discard_card'&&p.target_id===myPlayerId){ov.classList.remove('hidden');dg.innerHTML='<h3>🃏 过河拆桥 - 请选择一张手牌弃置</h3><div class="cards-row">'+(mp.hand_cards||[]).map(c=>'<div class="card-item" onclick="discardOneCard('+c.id+')"><div class="card-suit">'+c.suit+c.number+'</div><div class="card-name">'+c.name+'</div></div>').join('')+'</div>'}
else if(p.type==='shunshou_card'&&p.target_id===myPlayerId){ov.classList.remove('hidden');dg.innerHTML='<h3>🃏 顺手牵羊 - 对方将获得你一张手牌</h3><div class="cards-row">'+(mp.hand_cards||[]).map(c=>'<div class="card-item" onclick="shunshouCard('+c.id+')"><div class="card-suit">'+c.suit+c.number+'</div><div class="card-name">'+c.name+'</div></div>').join('')+'</div>'}
else{ov.classList.add('hidden')}
}
function selectCard(cid){selectedCardId=selectedCardId===cid?null:cid;playTone('click');renderGame()}
function useSelectedCard(){if(!selectedCardId){alert('请先选择一张卡牌');return};playTone('card');pendingCardAction='use';showTargetSelect()}
function equipSelectedCard(){if(!selectedCardId){alert('请先选择一张卡牌');return};socket.emit('game_action',{room_id:currentRoomId,action:{type:'use_card',card_id:selectedCardId,target_id:null}});selectedCardId=null}
function showTargetSelect(){document.getElementById('targetSelect').classList.remove('hidden');const ps=gameState.players.filter(p=>p.player_id!==myPlayerId&&p.is_alive);document.getElementById('targetPlayers').innerHTML=ps.map(p=>'<div class="player-mini" onclick="confirmTarget(\''+p.player_id+'\')"><div class="pname">'+p.name+'</div><div class="phero">'+p.hero.name+'</div><div class="php">'+'❤'.repeat(p.hp)+'</div></div>').join('')}
function selectTarget(pid){if(pendingCardAction==='use')confirmTarget(pid)}
function confirmTarget(tid){if(!selectedCardId)return;socket.emit('game_action',{room_id:currentRoomId,action:{type:'use_card',card_id:selectedCardId,target_id:tid}});selectedCardId=null;pendingCardAction=null;document.getElementById('targetSelect').classList.add('hidden')}
function cancelTarget(){pendingCardAction=null;document.getElementById('targetSelect').classList.add('hidden')}
function endPlayPhase(){socket.emit('game_action',{room_id:currentRoomId,action:{type:'end_play'}});selectedCardId=null}
function confirmDiscard(){if(!selectedCardId){alert('请选择要弃置的卡牌');return};socket.emit('discard_cards',{room_id:currentRoomId,card_ids:[selectedCardId]});selectedCardId=null}
function respondCard(cid){socket.emit('game_action',{room_id:currentRoomId,action:{type:'respond',card_id:cid}});document.getElementById('responseOverlay').classList.add('hidden')}
function passResponse(){socket.emit('game_action',{room_id:currentRoomId,action:{type:'pass'}});document.getElementById('responseOverlay').classList.add('hidden')}
function discardOneCard(cid){socket.emit('discard_cards',{room_id:currentRoomId,card_ids:[cid]});document.getElementById('responseOverlay').classList.add('hidden')}
function shunshouCard(cid){socket.emit('discard_cards',{room_id:currentRoomId,card_ids:[cid]});document.getElementById('responseOverlay').classList.add('hidden')}
refreshRooms();
</script>
<button class="btn sound-toggle" id="soundToggle" onclick="toggleSound()">🔊 音效</button>
</body>
</html>
